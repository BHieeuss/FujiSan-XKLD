<main class="job-detail-page">
  @if (loading) {
    <div class="job-detail-state"><i class="fas fa-spinner fa-spin"></i> Đang tải đơn hàng...</div>
  } @else if (!order) {
    <div class="job-detail-state">
      <i class="fas fa-circle-exclamation"></i>
      <p>{{ errorMessage || 'Không tìm thấy đơn hàng.' }}</p>
      <a routerLink="/don-hang">Quay lại danh sách đơn hàng</a>
    </div>
  } @else {
    <section class="job-detail-poster">
      <div class="container">
        <a class="job-detail-back" routerLink="/don-hang"><i class="fas fa-arrow-left"></i> Danh sách đơn hàng</a>
        <figure>
          <img [src]="order.imageUrl" alt="Ảnh đơn hàng VieJap" />
          @if (order.description) {
            <figcaption>{{ order.description }}</figcaption>
          }
        </figure>
      </div>
    </section>
  }
</main>
