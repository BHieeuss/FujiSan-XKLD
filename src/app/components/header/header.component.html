<div class="top-bar d-none d-lg-block">
  <div class="container">
    <div class="top-bar-inner">
      <div class="trust-message">
        <i class="fas fa-shield-alt"></i>
        <span>Thông tin chương trình rõ ràng, tư vấn trực tiếp</span>
      </div>
      <div class="contact-info">
        <a [href]="'tel:' + contactInfo.hotline">
          <i class="fas fa-phone-alt"></i>
          Hotline: {{ contactInfo.hotline }}
        </a>
        <a [href]="'mailto:' + contactInfo.email">
          <i class="fas fa-envelope"></i>
          {{ contactInfo.email }}
        </a>
        <a
          [href]="contactInfo.zaloUrl"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fas fa-comment-dots"></i>
          Tư vấn Zalo
        </a>
      </div>
    </div>
  </div>
</div>

<header
  class="main-header"
  [class.scrolled]="isScrolled && isHomePage"
  [class.transparent]="!isScrolled && isHomePage"
>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      <a
        class="navbar-brand"
        routerLink="/"
        fragment="trang-chu"
        aria-label="VieJap - Trang chủ"
        (click)="closeMobileMenu()"
      >
        <img src="assets/images/logo.png" alt="VieJap" class="logo-img" />
      </a>

      <button
        class="navbar-toggler"
        type="button"
        (click)="toggleMobileMenu()"
        [attr.aria-expanded]="isMobileMenuOpen"
        aria-controls="navbarNav"
        [attr.aria-label]="isMobileMenuOpen ? 'Đóng menu' : 'Mở menu'"
      >
        <span class="menu-icon" [class.open]="isMobileMenuOpen" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <div class="collapse navbar-collapse" [class.show]="isMobileMenuOpen" id="navbarNav">
        <div class="mobile-menu-head d-lg-none">
          <img src="assets/images/logo.png" alt="" class="mobile-menu-logo" />
          <button type="button" class="mobile-menu-close" (click)="closeMobileMenu()" aria-label="Đóng menu">
            <i class="fas fa-times"></i>
          </button>
        </div>

        <p class="mobile-menu-intro d-lg-none">
          Thông tin chương trình, lộ trình và hỗ trợ dành cho người Việt Nam làm việc tại Nhật Bản.
        </p>

        <ul class="navbar-nav mx-auto">
          <li
            class="nav-item"
            *ngFor="let item of mainMenuItems"
            [class.dropdown]="item.hasDropdown"
          >
            <a
              *ngIf="!item.hasDropdown"
              class="nav-link"
              [href]="'/#' + (menuSectionMap[item.label] || 'trang-chu')"
              [class.active]="item.active"
              (click)="onMenuClick($event, item)"
            >
              {{ item.label }}
            </a>

            <button
              *ngIf="item.hasDropdown"
              type="button"
              class="nav-link dropdown-toggle dropdown-trigger"
              [class.active]="item.active || isDropdownOpen(item.dropdownKey)"
              [attr.aria-expanded]="isDropdownOpen(item.dropdownKey)"
              (click)="toggleDropdown($event, item.dropdownKey)"
            >
              <span>{{ item.label }}</span>
            </button>

            <ul
              *ngIf="item.hasDropdown"
              class="dropdown-menu"
              [class.show]="isDropdownOpen(item.dropdownKey)"
            >
              <li *ngFor="let subItem of submenuFor(item.dropdownKey)">
                <a
                  class="dropdown-item"
                  [href]="subItem.link"
                  (click)="onSubmenuClick($event, subItem.link)"
                >
                  <i *ngIf="subItem.icon" [class]="subItem.icon"></i>
                  {{ subItem.label }}
                </a>
              </li>
            </ul>
          </li>
        </ul>

        <div class="navbar-actions d-flex align-items-center">
          <a
            class="btn btn-outline-primary btn-hotline me-lg-3 d-inline-flex align-items-center"
            [href]="'tel:' + contactInfo.hotline"
          >
            <i class="fas fa-phone-alt me-2"></i>
            {{ contactInfo.hotline }}
          </a>

          <button class="btn btn-primary btn-consultation" (click)="onRegisterConsultation()">
            <i class="fas fa-comment-dots me-2"></i>
            Tư vấn qua Zalo
          </button>
        </div>
      </div>
    </div>
  </nav>
</header>

<div class="mobile-menu-overlay" [class.show]="isMobileMenuOpen" (click)="closeMobileMenu()"></div>
