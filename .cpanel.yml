---
deployment:
  tasks:
    - export DEPLOYPATH="${DEPLOYPATH:-$HOME/public_html}"
    - export PATH="/opt/alt/alt-nodejs20/root/usr/bin:$PATH"
    - /usr/bin/env npm ci
    - /usr/bin/env npm run build
    - /bin/mkdir -p "$DEPLOYPATH"
    - /bin/cp -R dist/fujisan-website/browser/. "$DEPLOYPATH/"
